<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Test Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ GOOGLE ADSENSE (SAFE) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4812851647103049"
     crossorigin="anonymous"></script>

<style>
html, body {
  margin:0; padding:0; height:100%;
  font-family: Arial;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
  url('https://images.unsplash.com/photo-1508780709619-79562169bc64') no-repeat center center fixed;
  background-size: cover;
  color:white;
}

/* RESULT BOX SMALL */
#resultBox{
  display:none;
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:60%;
  background:rgba(0,0,0,0.95);
  padding:30px;
  border-radius:20px;
  text-align:center;
  z-index:9999;
}
#resultBox h1{font-size:35px;}
.resultText{font-size:20px; margin:6px;}

#resultBox button{
  margin:8px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:linear-gradient(45deg,#00ffcc,#0099ff);
}

/* SOCIAL BUTTONS */
.social-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  margin:5px;
  cursor:pointer;
  font-weight:bold;
}
.youtube{background:#ff0000; color:white;}
.instagram{background:#e1306c; color:white;}

.top-section { text-align:center; margin-top:20px;}
h1 { font-size:30px; color:#00ffcc;}

.top-right {
  position:absolute;
  right:20px;
  top:20px;
}
.lesson-bar {text-align:center; margin-top:10px;}
.lesson-btn { margin:5px; padding:8px 15px; border-radius:20px; border:none; cursor:pointer; background:#00ffcc;}

#main-container { display:flex; flex-direction:column; align-items:center; width:90%; max-width:1000px; margin:auto; margin-top:20px;}

#text { width:60%; padding:15px; background:rgba(0,0,0,0.6); height:140px;}
#input { width:60%; padding:10px; margin-top:10px;}

.correct {color:transparent;}
.wrong {color:red;}

#restartBtn { margin-top:15px; padding:12px 25px; border-radius:30px; background:linear-gradient(45deg,#00ffcc,#0099ff); border:none;}

#info-container { display:flex; justify-content:space-between; width:100%; margin-top:10px;}
#timerDisplay, #history, #leaderboard {
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:6px;
  width:32%;
}
</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="resultSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="typeSound" src="https://www.soundjay.com/mechanical/sounds/keyboard-1.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<!-- RESULT -->
<div id="resultBox">
  <h1>🏁 RESULT</h1>
  <div id="resWPM" class="resultText"></div>
  <div id="resAcc" class="resultText"></div>
  <div id="resErr" class="resultText"></div>
  <div id="resTime" class="resultText"></div>
  <button onclick="nextLevel()">Next ➡</button>
  <button onclick="restart()">Restart 🔄</button>
</div>

<div class="top-section">
  <h1>✨ कोशिश करने वालों की कभी हार नहीं होती ✨</h1>

  <!-- 🔘 SOCIAL BUTTONS -->
  <button class="social-btn youtube" onclick="window.open('https://www.youtube.com/@UnlimitedAppWala')">YouTube</button>
  <button class="social-btn instagram" onclick="window.open('https://www.instagram.com/gaurav_vargadhiya')">Instagram</button>
</div>

<div class="lesson-bar" id="lessonBar"></div>

<div id="main-container">
  <div id="text"></div>
  <input type="text" id="input" placeholder="Start typing...">
  <button id="restartBtn" onclick="restart()">🔄 Restart</button>

  <div id="info-container">
    <div id="timerDisplay">
      ⏱ Time: <span id="timer">0</span><br>
      ⚡ Speed: <span id="speed">0</span> WPM<br>
      🎯 Accuracy: <span id="accuracy">100</span>%
    </div>

    <div id="history">History:</div>
    <div id="leaderboard">Top 5:</div>
  </div>
</div>

<script>

// ✅ SAME 16 PARTS (UNCHANGED)
const lessons = [
`ask dad sad lad fall ask dad sad lad ask fall flask salad dad asks lad ask dad sad lad fall ask dad sad lad ask fall flask salad dad asks lad`,
`a glad dad has a gag gals dash flags glash dad has half a salad a glad dad has a gag gals dash flags glash dad has half a salad`,
`we are you try type write quit we are you try type write quit we are you try type write quit`,
`power quiet write row your type upper power write power quiet write row your type upper power write`,
`ace aim ave axe bac ban bam bin biz bon box bun cab cam cob con cox coz cub cuz eve mac comb come cone cove exam icon main mane maxi maze mean menu move name man men mic mix mob moz nix obe one uni vac vim van vox`,
`zoom mix zinc vex mix zone comic zone zoom mix move next zoom mix zinc vex mix zone comic zone zoom mix move next`,
`the quick brown fox type write power quiet row top your quit the quick brown fox type write power quiet row top your quit`,
`and the for you not but can had this that there where what when and the for you not but can had this that there where what when`,
`the quick brown fox jumps over the lazy dog typing is good the quick brown fox jumps over the lazy dog typing is good`,
`we are learning typing fast practice makes typing better we are learning typing fast practice makes typing better`,
`type fast and move quick keep your speed up now never stop type fast and move quick keep your speed up now never stop`,
`Ask Dad Sad Lad Fall Ask Dad Ask Dad Sad Lad Fall Ask Dad Ask Dad Sad Lad Fall Ask Dad Ask Dad Sad Lad Fall Ask Dad`,
`The Quick Brown Fox Jumps Over The Lazy Dog The Quick Brown Fox Jumps Over The Lazy Dog The Quick Brown Fox Jumps Over The Lazy Dog`,
`Typing Is A Good Skill To Learn Fast Typing Is A Good Skill To Learn Fast Typing Is A Good Skill To Learn Fast Typing Is A Good Skill To Learn Fast`,
`This is a Typing Practice lesson Practice makes a Man perfect This is a Typing Practice lesson Practice makes a Man perfect This is a Typing Practice lesson Practice makes a Man perfect `,
`Fast type and move Quick zoom over next mix Typing skill fast type and Move quick zoom over Next mix typing skill Fast type and move Quick Zoom over Next mix Typing Skill`
];

let currentLesson = 0;
let startTime = null;
let timerInterval;
let errors = 0;

const textDiv = document.getElementById("text");
const input = document.getElementById("input");
const typeSound = document.getElementById("typeSound");
const wrongSound = document.getElementById("wrongSound");

// buttons
const lessonBar = document.getElementById("lessonBar");
lessons.forEach((_, i) => {
  let btn = document.createElement("button");
  btn.innerText = "Part " + (i+1);
  btn.className = "lesson-btn";
  btn.onclick = () => setLesson(i);
  lessonBar.appendChild(btn);
});

function setLesson(i){ currentLesson = i; restart(); }

function loadText(){
  textDiv.innerHTML = lessons[currentLesson]
    .split("")
    .map(c=>`<span>${c}</span>`)
    .join("");
}

input.addEventListener("input", ()=>{
  typeSound.currentTime=0; typeSound.play();

  if(!startTime){
    startTime = new Date();
    timerInterval = setInterval(updateTimer,1000);
  }

  let val = input.value;
  let spans = textDiv.querySelectorAll("span");

  errors = 0;

  spans.forEach((span,i)=>{
    let char = val[i];
    if(char == null){
      span.className="";
    }
    else if(char === lessons[currentLesson][i]){
      span.className="correct";
    } else {
      span.className="wrong";
      errors++;
      wrongSound.currentTime=0; wrongSound.play();
    }
  });

  if(val.length === lessons[currentLesson].length){
    finishTest();
  }
});

function updateTimer(){
  let time = Math.floor((new Date() - startTime)/1000);
  document.getElementById("timer").innerText = time;
}

function finishTest(){
  clearInterval(timerInterval);

  let time = (new Date() - startTime)/1000;
  let words = lessons[currentLesson].split(" ").length;
  let wpm = Math.round((words/time)*60);

  let totalChars = lessons[currentLesson].length;
  let accuracy = Math.round(((totalChars-errors)/totalChars)*100);

  document.getElementById("speed").innerText = wpm;
  document.getElementById("accuracy").innerText = accuracy;

  document.getElementById("resultSound").play();

  document.getElementById("resultBox").style.display="block";
  document.getElementById("resWPM").innerText = "⚡ Speed: "+wpm+" WPM";
  document.getElementById("resAcc").innerText = "🎯 Accuracy: "+accuracy+"%";
  document.getElementById("resErr").innerText = "❌ Errors: "+errors;
  document.getElementById("resTime").innerText = "⏱ Time: "+time.toFixed(1)+" sec";
}

document.addEventListener("keydown", function(e){
  if(document.getElementById("resultBox").style.display==="block"){
    if(e.key==="Enter") nextLevel();
    if(e.key==="r"||e.key==="R") restart();
  }
});

function nextLevel(){
  document.getElementById("resultBox").style.display="none";
  if(currentLesson < lessons.length-1){
    currentLesson++;
  }
  restart();
}

function restart(){
  input.value="";
  startTime=null;
  clearInterval(timerInterval);
  document.getElementById("timer").innerText=0;
  document.getElementById("resultBox").style.display="none";
  loadText();
}

loadText();

</script>

</body>
</html>
